<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cognexia</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--text:#e8e8e8;--text2:#999;--text3:#666;--accent:#6366f1;--accent2:#818cf8;--danger:#ef4444;--success:#22c55e}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;font-size:14px}
header{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0}
.logo{font-size:16px;font-weight:600;color:var(--text)}.logo span{color:#818cf8}
.search-box{display:flex;align-items:center;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:0 12px;gap:8px;width:280px}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-size:13px;padding:8px 0;width:100%}
.search-box input::placeholder{color:var(--text3)}
.btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px;transition:background 0.15s;white-space:nowrap}
.btn:hover{background:var(--bg2)}.btn-primary{background:#6366f1;border-color:#6366f1;color:#fff}.btn-primary:hover{background:#5558e8}
.btn-danger{color:var(--danger);border-color:rgba(239,68,68,0.3)}.btn-danger:hover{background:rgba(239,68,68,0.1)}
.layout{display:flex;flex:1;overflow:hidden}
sidebar{width:220px;flex-shrink:0;border-right:1px solid var(--border);background:var(--bg);display:flex;flex-direction:column;overflow-y:auto}
.sidebar-section{padding:16px 12px 8px;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em}
.project-item{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;cursor:pointer;border-radius:6px;margin:1px 8px;color:var(--text2);transition:all 0.1s}
.project-item:hover{background:var(--bg3);color:var(--text)}
.project-item.active{background:var(--bg3);color:var(--text);border-left:2px solid #6366f1;padding-left:14px}
.project-name{font-size:13px}.project-count{font-size:11px;background:var(--bg2);color:var(--text3);padding:1px 7px;border-radius:10px;min-width:20px;text-align:center}
.project-item.active .project-count{background:#6366f1;color:#fff}
.view-toggle{display:flex;gap:4px;padding:12px;border-top:1px solid var(--border);margin-top:auto}
.view-btn{flex:1;padding:6px;border:1px solid var(--border2);background:none;color:var(--text3);border-radius:6px;cursor:pointer;font-size:12px;text-align:center;transition:all 0.1s}
.view-btn.active{background:var(--bg3);color:var(--text);border-color:var(--border2)}
main{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.filter-select{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:7px 12px;border-radius:8px;font-size:13px;cursor:pointer;outline:none}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.06em}
.stat-value{font-size:22px;font-weight:600;color:var(--text)}
.memories-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.memory-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:border-color 0.15s;position:relative}
.memory-card:hover{border-color:var(--border2)}
.memory-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.type-badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.04em}
.type-insight{background:rgba(99,102,241,0.15);color:#818cf8}
.type-goal{background:rgba(245,158,11,0.15);color:#fbbf24}
.type-milestone{background:rgba(34,197,94,0.15);color:#4ade80}
.type-preference{background:rgba(6,182,212,0.15);color:#22d3ee}
.type-error{background:rgba(239,68,68,0.15);color:#f87171}
.type-security{background:rgba(249,115,22,0.15);color:#fb923c}
.importance-dot{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text3)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--text3)}.dot.high{background:#f59e0b}.dot.critical{background:#ef4444}
.memory-content{font-size:13px;line-height:1.6;color:var(--text);margin-bottom:10px;word-break:break-word}
.memory-footer{display:flex;align-items:center;justify-content:space-between}
.memory-meta{font-size:11px;color:var(--text3)}
.memory-actions{display:flex;gap:6px;opacity:0;transition:opacity 0.15s}
.memory-card:hover .memory-actions{opacity:1}
.icon-btn{background:none;border:1px solid var(--border2);color:var(--text2);padding:4px 8px;border-radius:6px;cursor:pointer;font-size:11px;transition:all 0.1s}
.icon-btn:hover{background:var(--bg3);color:var(--text)}.icon-btn.del:hover{background:rgba(239,68,68,0.1);color:var(--danger);border-color:rgba(239,68,68,0.3)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}.empty-state h3{font-size:16px;color:var(--text2);margin-bottom:8px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-overlay.hidden{display:none}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:24px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal h2{font-size:17px;margin-bottom:20px;color:var(--text)}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
.form-input,.form-select,.form-textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:9px 12px;font-size:13px;outline:none;font-family:inherit;transition:border-color 0.15s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:#6366f1}
.form-textarea{resize:vertical;min-height:100px;line-height:1.6}
.importance-row{display:flex;align-items:center;gap:12px}
.importance-row input[type=range]{flex:1;accent-color:#6366f1}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.graph-container{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
canvas#graphCanvas{display:block;width:100%;cursor:grab}
canvas#graphCanvas:active{cursor:grabbing}
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:12px 18px;border-radius:10px;font-size:13px;z-index:200;opacity:0;transform:translateY(8px);transition:all 0.2s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}.toast.success{border-color:rgba(34,197,94,0.4);color:#4ade80}.toast.error{border-color:rgba(239,68,68,0.4);color:#f87171}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text3);font-size:13px;gap:10px}
.spinner{width:18px;height:18px;border:2px solid var(--border2);border-top-color:#6366f1;border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.section-heading{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:4px}
</style>
</head>
<body>
<header>
<div class="logo">Cogn<span>exia</span></div>
<div class="search-box">
<span style="color:var(--text3);font-size:14px">&#9906;</span>
<input type="text" id="searchInput" placeholder="Search memories..." autocomplete="off">
</div>
<div style="display:flex;align-items:center;gap:10px">
<button class="btn btn-primary" onclick="openAddModal()">+ New Memory</button>
</div>
</header>
<div class="layout">
<sidebar>
<div class="sidebar-section">Projects</div>
<div id="projectList"></div>
<div class="view-toggle">
<button class="view-btn active" id="viewTimeline" onclick="setView('timeline')">Timeline</button>
<button class="view-btn" id="viewGraph" onclick="setView('graph')">Graph</button>
</div>
</sidebar>
<main id="mainContent">
<div class="loading"><div class="spinner"></div> Loading...</div>
</main>
</div>
<div class="modal-overlay hidden" id="modalOverlay">
<div class="modal">
<h2 id="modalTitle">New Memory</h2>
<input type="hidden" id="editId">
<div class="form-group">
<label class="form-label">Content</label>
<textarea class="form-textarea" id="memContent" placeholder="What do you want to remember?"></textarea>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
<div class="form-group">
<label class="form-label">Type</label>
<select class="form-select" id="memType">
<option value="insight">Insight</option>
<option value="goal">Goal</option>
<option value="milestone">Milestone</option>
<option value="preference">Preference</option>
<option value="error">Error / Lesson</option>
<option value="security">Security</option>
</select>
</div>
<div class="form-group">
<label class="form-label">Project</label>
<select class="form-select" id="memProject"></select>
</div>
</div>
<div class="form-group">
<label class="form-label">Importance: <span id="importanceDisplay">7</span></label>
<div class="importance-row">
<span style="font-size:11px;color:var(--text3)">1</span>
<input type="range" min="1" max="10" value="7" id="memImportance" oninput="document.getElementById('importanceDisplay').textContent=this.value" step="1">
<span style="font-size:11px;color:var(--text3)">10</span>
</div>
</div>
<div class="modal-actions">
<button class="btn" onclick="closeModal()">Cancel</button>
<button class="btn btn-primary" onclick="saveMemory()">Save Memory</button>
</div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
const API='http://localhost:10000/api';
let currentProject='general',allProjects=[],allMemories=[],currentView='timeline',searchTimeout=null,isDragging=false,dragStart=null,offset={x:0,y:0},scale=1;
async function req(method,path,body){const opts={method,headers:{'Content-Type':'application/json'}};if(body)opts.body=JSON.stringify(body);const res=await fetch(API+path,opts);const json=await res.json();if(!json.success)throw new Error(json.error||'Request failed');return json.data}
function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+type;setTimeout(()=>t.className='toast',2500)}
async function loadProjects(){try{const data=await req('GET','/projects');allProjects=data.projects||[];renderSidebar();populateProjectSelect()}catch(e){showToast('Cannot connect to Cognexia','error')}}
async function getProjectCount(project){try{const data=await req('GET',`/memory/query?q=a&project=${project}&limit=200`);return data.count||0}catch{return 0}}
async function renderSidebar(){const list=document.getElementById('projectList');const counts=await Promise.all(allProjects.map(p=>getProjectCount(p)));list.innerHTML=allProjects.map((p,i)=>`<div class="project-item ${p===currentProject?'active':''}" onclick="selectProject('${p}')"><span class="project-name">${p}</span><span class="project-count">${counts[i]}</span></div>`).join('')}
function populateProjectSelect(){const sel=document.getElementById('memProject');sel.innerHTML=allProjects.map(p=>`<option value="${p}" ${p===currentProject?'selected':''}>${p}</option>`).join('')}
function selectProject(p){currentProject=p;renderSidebar();loadView()}
async function loadMemories(){try{const data=await req('GET',`/memory/query?q=a&project=${currentProject}&limit=200`);allMemories=data.results||[]}catch{allMemories=[]}}
async function loadView(){const main=document.getElementById('mainContent');main.innerHTML='<div class="loading"><div class="spinner"></div> Loading...</div>';await loadMemories();if(currentView==='timeline')renderTimeline();else renderGraph()}
function setView(v){currentView=v;document.getElementById('viewTimeline').classList.toggle('active',v==='timeline');document.getElementById('viewGraph').classList.toggle('active',v==='graph');loadView()}
function typeDotClass(imp){if(imp>=9)return'critical';if(imp>=7)return'high';return''}
function formatDate(d){return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}
function renderMemoryCard(m){const dotClass=typeDotClass(m.importance);return`<div class="memory-card" data-id="${m.id}"><div class="memory-card-top"><span class="type-badge type-${m.content_type}">${m.content_type}</span><div class="importance-dot"><div class="dot ${dotClass}"></div>${m.importance}/10</div></div><div class="memory-content">${escHtml(m.content)}</div><div class="memory-footer"><span class="memory-meta">${formatDate(m.created_at)}</span><div class="memory-actions"><button class="icon-btn" onclick="openEditModal('${m.id}')">Edit</button><button class="icon-btn del" onclick="deleteMemory('${m.id}')">Delete</button></div></div></div>`}
function renderTimeline(){const main=document.getElementById('mainContent');const typeFilter=document.getElementById('typeFilter')?document.getElementById('typeFilter').value:'all';const sortFilter=document.getElementById('sortFilter')?document.getElementById('sortFilter').value:'newest';let memories=[...allMemories];if(typeFilter!=='all')memories=memories.filter(m=>m.content_type===typeFilter);if(sortFilter==='newest')memories.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));else if(sortFilter==='oldest')memories.sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));else if(sortFilter==='importance')memories.sort((a,b)=>b.importance-a.importance);const counts={total:allMemories.length,insight:allMemories.filter(m=>m.content_type==='insight').length,goal:allMemories.filter(m=>m.content_type==='goal').length,milestone:allMemories.filter(m=>m.content_type==='milestone').length};let html=`<div class="stats-row"><div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">${counts.total}</div></div><div class="stat-card"><div class="stat-label">Insights</div><div class="stat-value">${counts.insight}</div></div><div class="stat-card"><div class="stat-label">Goals</div><div class="stat-value">${counts.goal}</div></div><div class="stat-card"><div class="stat-label">Milestones</div><div class="stat-value">${counts.milestone}</div></div></div><div class="toolbar"><select class="filter-select" id="typeFilter" onchange="renderTimeline()"><option value="all">All types</option><option value="insight">Insight</option><option value="goal">Goal</option><option value="milestone">Milestone</option><option value="preference">Preference</option><option value="error">Error</option><option value="security">Security</option></select><select class="filter-select" id="sortFilter" onchange="renderTimeline()"><option value="newest">Newest first</option><option value="oldest">Oldest first</option><option value="importance">By importance</option></select></div>`;if(memories.length===0){html+=`<div class="empty-state"><h3>No memories yet</h3><p>Add your first memory using the button above.</p></div>`}else{html+=`<div class="memories-grid">${memories.map(renderMemoryCard).join('')}</div>`}main.innerHTML=html;if(typeFilter!=='all')document.getElementById('typeFilter').value=typeFilter;if(sortFilter!=='newest')document.getElementById('sortFilter').value=sortFilter}
function renderGraph(){const main=document.getElementById('mainContent');main.innerHTML=`<div class="graph-container" style="position:relative"><canvas id="graphCanvas" height="520"></canvas><div id="graphLegend" style="position:absolute;bottom:10px;left:12px;display:flex;flex-wrap:wrap;gap:6px;pointer-events:none;background:rgba(10,10,20,0.7);padding:6px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.06)"></div></div>`;const canvas=document.getElementById('graphCanvas');canvas.width=canvas.offsetWidth;const ctx=canvas.getContext('2d');const typeColors={insight:'#6366f1',goal:'#f59e0b',milestone:'#22c55e',preference:'#06b6d4',error:'#ef4444',security:'#f97316',decision:'#a855f7',conversation:'#64748b'};const legend=document.getElementById('graphLegend');const usedTypes=[...new Set(allMemories.map(m=>m.content_type).filter(Boolean))];usedTypes.forEach(type=>{const color=typeColors[type]||'#888';legend.innerHTML+=`<span style="display:flex;align-items:center;gap:4px;font-size:11px;color:rgba(220,220,240,0.85)"><span style="width:9px;height:9px;border-radius:50%;background:${color};display:inline-block;flex-shrink:0"></span>${type}</span>`});const nodes=allMemories.map((m,i)=>{const angle=(i/allMemories.length)*Math.PI*2;const r=160+Math.random()*80;return{id:m.id,x:canvas.width/2+Math.cos(angle)*r,y:260+Math.sin(angle)*r,r:6+m.importance*1.2,color:typeColors[m.content_type]||'#888',label:m.content.substring(0,28)+(m.content.length>28?'…':''),memory:m}});let hovered=null;function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.save();ctx.translate(offset.x,offset.y);ctx.scale(scale,scale);nodes.forEach(n=>{nodes.forEach(n2=>{if(n.id>=n2.id)return;if(n.memory.content_type===n2.memory.content_type){ctx.beginPath();ctx.moveTo(n.x,n.y);ctx.lineTo(n2.x,n2.y);ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;ctx.stroke()}})});nodes.forEach(n=>{ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fillStyle=n===hovered?'#fff':n.color;ctx.globalAlpha=n===hovered?1:0.85;ctx.fill();ctx.globalAlpha=1;ctx.font=(n===hovered?'bold ':'')+'11px -apple-system,sans-serif';ctx.fillStyle=n===hovered?'#ffffff':'rgba(220,220,240,0.75)';ctx.fillText(n.label,n.x+n.r+5,n.y+4)});ctx.restore()}draw();canvas.addEventListener('mousemove',e=>{const rect=canvas.getBoundingClientRect();const mx=(e.clientX-rect.left-offset.x)/scale;const my=(e.clientY-rect.top-offset.y)/scale;const prev=hovered;hovered=nodes.find(n=>Math.hypot(n.x-mx,n.y-my)<n.r+4)||null;if(hovered!==prev)draw();if(isDragging){offset.x=e.clientX-rect.left-dragStart.x;offset.y=e.clientY-rect.top-dragStart.y;draw()}});canvas.addEventListener('mousedown',e=>{const rect=canvas.getBoundingClientRect();isDragging=true;dragStart={x:e.clientX-rect.left-offset.x,y:e.clientY-rect.top-offset.y}});canvas.addEventListener('mouseup',()=>isDragging=false);canvas.addEventListener('wheel',e=>{e.preventDefault();scale=Math.max(0.3,Math.min(3,scale*(e.deltaY<0?1.1:0.9)));draw()})}
function openAddModal(){document.getElementById('modalTitle').textContent='New Memory';document.getElementById('editId').value='';document.getElementById('memContent').value='';document.getElementById('memType').value='insight';document.getElementById('memImportance').value=7;document.getElementById('importanceDisplay').textContent='7';document.getElementById('memProject').value=currentProject;document.getElementById('modalOverlay').classList.remove('hidden');document.getElementById('memContent').focus()}
function openEditModal(id){const m=allMemories.find(m=>m.id===id);if(!m)return;document.getElementById('modalTitle').textContent='Edit Memory';document.getElementById('editId').value=id;document.getElementById('memContent').value=m.content;document.getElementById('memType').value=m.content_type;document.getElementById('memImportance').value=m.importance;document.getElementById('importanceDisplay').textContent=m.importance;document.getElementById('memProject').value=m.project||currentProject;document.getElementById('modalOverlay').classList.remove('hidden')}
function closeModal(){document.getElementById('modalOverlay').classList.add('hidden')}
async function saveMemory(){const content=document.getElementById('memContent').value.trim();if(!content){showToast('Content cannot be empty','error');return}const editId=document.getElementById('editId').value;const body={content,type:document.getElementById('memType').value,project:document.getElementById('memProject').value,importance:parseInt(document.getElementById('memImportance').value),agentId:'my-agent'};try{if(editId){await req('PATCH',`/memory/${editId}?project=${body.project}`,body);showToast('Memory updated','success')}else{await req('POST','/memory/store',body);showToast('Memory saved','success')}closeModal();renderSidebar();loadView()}catch(e){showToast(e.message,'error')}}
async function deleteMemory(id){if(!confirm('Delete this memory?'))return;const m=allMemories.find(m=>m.id===id);const project=m?(m.project||currentProject):currentProject;try{await req('DELETE',`/memory/${id}?project=${project}`);showToast('Memory deleted','success');renderSidebar();loadView()}catch(e){showToast(e.message,'error')}}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
document.getElementById('searchInput').addEventListener('input',function(){clearTimeout(searchTimeout);const q=this.value.trim();if(!q){loadView();return}searchTimeout=setTimeout(()=>performSearch(q),300)});
async function performSearch(q){const main=document.getElementById('mainContent');main.innerHTML='<div class="loading"><div class="spinner"></div> Searching...</div>';try{const data=await req('GET',`/memory/query?q=${encodeURIComponent(q)}&project=${currentProject}&limit=50`);const results=data.results||[];if(results.length===0){main.innerHTML=`<div class="empty-state"><h3>No results for "${escHtml(q)}"</h3></div>`;return}main.innerHTML=`<div class="section-heading">${results.length} result${results.length!==1?'s':''} for "${escHtml(q)}"</div><div class="memories-grid">${results.map(renderMemoryCard).join('')}</div>`}catch(e){showToast(e.message,'error');loadView()}}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();document.getElementById('searchInput').value='';loadView()}if(e.key==='n'&&document.activeElement.tagName!=='INPUT'&&document.activeElement.tagName!=='TEXTAREA')openAddModal()});
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('modalOverlay'))closeModal()});
loadProjects().then(()=>loadView());
</script>
</body>
</html>
